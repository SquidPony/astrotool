name: Setup Android Build Environment

description: Configure Java and .NET for Android builds with caching

inputs:
  dotnet-version:
    description: Dotnet SDK version
    required: false
    default: "10.0.x"
  java-version:
    description: Java version
    required: false
    default: "21"

runs:
  using: composite
  steps:
    - name: Set up Java
      uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
      with:
        java-version: ${{ inputs.java-version }}
        distribution: microsoft

    - name: Set up .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
        cache: true
        cache-dependency-path: |
          **/*.csproj
          global.json
          Directory.Packages.props
          **/packages.lock.json

    - name: Cache .NET workload packs
      uses: actions/cache@v4
      with:
        path: |
          ~/.dotnet/packs
          ~/.dotnet/sdk-manifests
          ~/.nuget/packages
        key: ${{ runner.os }}-android-workload-${{ hashFiles('global.json', '**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-android-workload-

    - name: Install Android workload
      shell: bash
      run: |
        install_start=$(date +%s)
        dotnet workload install maui-android --skip-manifest-update
        install_end=$(date +%s)
        install_secs=$((install_end - install_start))
        {
          echo "### Android Setup Timing"
          echo ""
          echo "| Step | Duration (s) |"
          echo "|---|---:|"
          echo "| Install maui-android workload | ${install_secs} |"
        } >> "$GITHUB_STEP_SUMMARY"
