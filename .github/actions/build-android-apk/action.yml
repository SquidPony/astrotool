name: Build Android APK

description: Build Android APK for AstroTool

inputs:
  configuration:
    description: Build configuration
    required: false
    default: "Release"

runs:
  using: composite
  steps:
    - name: Restore Android project
      shell: bash
      run: |
        restore_start=$(date +%s)
        dotnet restore AstroTool.Core/AstroTool.Core.csproj
        python3 -c "import json; from pathlib import Path; data = json.loads(Path('AstroTool.Core/obj/project.assets.json').read_text()); print('Core restore targets:', ', '.join(sorted(data.get('targets', {}).keys())))"
        dotnet restore AstroTool/AstroTool.csproj \
          -p:TargetFramework=net10.0-android \
          -p:EnableAndroidTarget=true \
          -p:UseCurrentRuntimeIdentifier=false
        python3 -c "import json; from pathlib import Path; data = json.loads(Path('AstroTool.Core/obj/project.assets.json').read_text()); print('Core assets after app restore:', ', '.join(sorted(data.get('targets', {}).keys())))"
        restore_end=$(date +%s)
        echo "ANDROID_RESTORE_SECS=$((restore_end - restore_start))" >> "$GITHUB_ENV"

    - name: Build Android APK
      shell: bash
      run: |
        publish_start=$(date +%s)
        dotnet publish AstroTool/AstroTool.csproj \
          -f net10.0-android \
          -r android-arm64 \
          -c ${{ inputs.configuration }} \
          --no-restore \
          -p:EnableAndroidTarget=true \
          -p:UseCurrentRuntimeIdentifier=false \
          -p:AndroidKeyStore=false
        publish_end=$(date +%s)
        publish_secs=$((publish_end - publish_start))
        total_secs=$((ANDROID_RESTORE_SECS + publish_secs))
        {
          echo "### Android Build Timing"
          echo ""
          echo "| Step | Duration (s) |"
          echo "|---|---:|"
          echo "| Restore (net10.0-android) | ${ANDROID_RESTORE_SECS} |"
          echo "| Publish APK | ${publish_secs} |"
          echo "| Total (restore + publish) | ${total_secs} |"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Verify APK output
      shell: bash
      run: ls -lah AstroTool/bin/${{ inputs.configuration }}/net10.0-android/**/publish/*.apk
