name: Auto Release on PR and Main Events

on:
  pull_request:
    branches: [ main ]
    types: [ opened, closed ]
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: auto-release-${{ github.repository }}-${{ github.event.pull_request.merge_commit_sha || github.sha }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && github.ref_protected == true) ||
      (github.event_name == 'pull_request' && github.event.action == 'opened' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.base.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      url: ${{ steps.release.outputs.url }}

    steps:
      - name: Create release for event
        id: release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const eventName = context.eventName;
            const action = context.payload.action || "";

            const now = new Date();
            const yyyy = now.getUTCFullYear();
            const mm = String(now.getUTCMonth() + 1).padStart(2, "0");
            const dd = String(now.getUTCDate()).padStart(2, "0");

            let tag;
            let targetCommitish;
            let releaseName;
            let body;
            let prerelease = false;
            let skipRelease = false;

            if (eventName === "pull_request" && action === "opened") {
              const pr = context.payload.pull_request;
              const shortSha = (pr.head.sha || context.sha).slice(0, 7);
              tag = `v${yyyy}.${mm}.${dd}-pr${pr.number}-${shortSha}`;
              targetCommitish = pr.head.sha || context.sha;
              releaseName = `🔍 Preview: ${pr.title}`;
              body = `**Preview release** of PR #${pr.number}\n\n${pr.title}\n\nBuilt artifacts will be attached once the build completes.`;
              prerelease = true;
            } else if (eventName === "pull_request" && action === "closed") {
              const pr = context.payload.pull_request;
              const shortSha = (pr.merge_commit_sha || context.sha).slice(0, 7);
              tag = `v${yyyy}.${mm}.${dd}-release-pr${pr.number}-${shortSha}`;
              targetCommitish = pr.merge_commit_sha || "main";
              releaseName = `✅ Release: ${pr.title}`;
              body = `**Release** of merged PR #${pr.number}\n\n${pr.title}\n\nExecutable build artifacts are attached below.`;
            } else {
              // Skip duplicate release creation when this push commit is already
              // the merge commit of a PR into main.
              const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha
              });

              const mergedMainPr = (associated.data || []).find((pr) => pr.merged_at && pr.base && pr.base.ref === "main");
              if (mergedMainPr) {
                skipRelease = true;
                core.info(`Skipping push release for ${context.sha}; commit is merge of PR #${mergedMainPr.number}.`);
              }

              const shortSha = (context.sha || "").slice(0, 7);
              tag = `v${yyyy}.${mm}.${dd}-build-${shortSha}`;
              targetCommitish = context.sha || "main";
              releaseName = `📦 Build: ${yyyy}-${mm}-${dd}`;
              body = `**Automated build release** for main branch commit ${shortSha}\n\nExecutable build artifacts are attached below.`;
            }

            if (skipRelease) {
              core.setOutput("tag", "skipped");
              core.setOutput("url", "skipped");
              return;
            }

            core.info(`Preparing release with tag ${tag}`);

            let release;
            try {
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: targetCommitish,
                name: releaseName,
                body,
                draft: false,
                prerelease,
                generate_release_notes: true
              });
              release = created.data;
              core.info(`Created release: ${release.html_url}`);
            } catch (error) {
              const message = error.message || "";
              const alreadyExists = error.status === 422 && message.includes("already_exists");

              if (!alreadyExists) {
                throw error;
              }

              core.info(`Release tag ${tag} already exists. Fetching existing release.`);
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              release = existing.data;
            }

            core.setOutput("tag", tag);
            core.setOutput("url", release.html_url);

      - name: Release summary
        run: |
          echo "Release created/available: ${{ steps.release.outputs.url }}"
          echo "Tag: ${{ steps.release.outputs.tag }}"

  build-android-release:
    name: Build Android Release Asset
    runs-on: ubuntu-latest
    needs: [ create-release ]
    if: needs.create-release.outputs.tag != 'skipped'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Install Android workload
        run: dotnet workload install maui-android

      - name: Build Android APK
        run: >
          dotnet publish AstroTool/AstroTool.csproj
          -f net10.0-android
          -c Release
          -p:EnableAndroidTarget=true
          -p:AndroidKeyStore=false

      - name: Upload Android artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-android-apk
          path: AstroTool/bin/Release/net10.0-android/publish/*.apk
          if-no-files-found: error

  build-windows-release:
    name: Build Windows Release Asset
    runs-on: ubuntu-latest
    needs: [ create-release ]
    if: needs.create-release.outputs.tag != 'skipped'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Install Windows MAUI workload
        run: dotnet workload install maui-windows

      - name: Publish Windows (self-contained)
        run: >
          dotnet publish AstroTool/AstroTool.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -r win-x64
          -p:EnableWindowsTargeting=true
          --self-contained true

      - name: Zip Windows publish output
        run: |
          cd AstroTool/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish
          zip -r ../../../../../../astrotool-windows-x64.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-windows-x64
          path: astrotool-windows-x64.zip
          if-no-files-found: error

  build-ios-release:
    name: Build iOS Release Asset
    runs-on: macos-latest
    needs: [ create-release ]
    if: needs.create-release.outputs.tag != 'skipped'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.203'

      - name: Install iOS workload
        run: dotnet workload install maui-ios

      - name: Build iOS (simulator)
        run: >
          dotnet build AstroTool/AstroTool.csproj
          -f net10.0-ios
          -c Debug
          -p:EnableAppleTargets=false
          -p:EnableIosTarget=true
          -p:MtouchLink=SdkOnly
          -p:RuntimeIdentifier=iossimulator-arm64
          -p:CodesignKey=""
          -p:CodesignProvision=""

      - name: Upload iOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-ios-simulator-app
          path: AstroTool/bin/Debug/net10.0-ios/iossimulator-arm64/**/*.app
          if-no-files-found: error

  build-maccatalyst-release:
    name: Build macCatalyst Release Asset
    runs-on: macos-latest
    needs: [ create-release ]
    if: needs.create-release.outputs.tag != 'skipped'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.203'

      - name: Install macCatalyst workload
        run: dotnet workload install maui-maccatalyst

      - name: Build macCatalyst
        run: >
          dotnet build AstroTool/AstroTool.csproj
          -f net10.0-maccatalyst
          -c Debug
          -p:RuntimeIdentifier=maccatalyst-arm64
          -p:MtouchLink=SdkOnly
          -p:EnableCodeSigning=false
          -p:CodesignKey=""
          -p:CodesignProvision=""

      - name: Upload macCatalyst artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-maccatalyst-app
          path: AstroTool/bin/Debug/net10.0-maccatalyst/**/*.app
          if-no-files-found: error

  publish-release-assets:
    name: Attach Built Assets to Release
    runs-on: ubuntu-latest
    needs: [ create-release, build-android-release, build-windows-release, build-ios-release, build-maccatalyst-release ]
    if: needs.create-release.outputs.tag != 'skipped'
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-android-apk
          path: ./artifacts/android

      - name: Download Windows ZIP
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-windows-x64
          path: ./artifacts/windows

      - name: Download iOS app
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-ios-simulator-app
          path: ./artifacts/ios

      - name: Download macCatalyst app
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-maccatalyst-app
          path: ./artifacts/maccatalyst

      - name: Zip iOS artifact
        run: |
          cd ./artifacts/ios
          zip -r ../astrotool-ios-simulator.zip .

      - name: Zip macCatalyst artifact
        run: |
          cd ./artifacts/maccatalyst
          zip -r ../astrotool-maccatalyst.zip .

      - name: Upload release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            ./artifacts/android/*.apk
            ./artifacts/windows/*.zip
            ./artifacts/astrotool-ios-simulator.zip
            ./artifacts/astrotool-maccatalyst.zip

  # ─────────────────────────────────────────────────────────
  # Bump version after successful merge to main
  # ─────────────────────────────────────────────────────────
  update-version:
    name: Update Version
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.event.head_commit != null
    runs-on: ubuntu-latest
    needs: [ create-release ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Bump minor version
        run: |
          bash scripts/version.sh bump-minor > /tmp/new-version.txt
          NEW_VERSION=$(tail -n 1 /tmp/new-version.txt)
          echo "New version: $NEW_VERSION"

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push version update
        run: |
          NEW_VERSION=$(cat version.txt)
          git add version.txt
          git commit -m "update-version: Bump to $NEW_VERSION" || echo "No changes to commit"
          git push origin main || echo "Failed to push, may already be updated"
        continue-on-error: true