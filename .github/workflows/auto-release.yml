name: Auto Release on PR and Main Events

on:
  pull_request:
    branches: [ main ]
    types: [ opened, closed ]
  push:
    branches: [ main ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_XMLDOC_MODE: skip

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: auto-release-${{ github.repository }}-${{ github.event.pull_request.merge_commit_sha || github.sha }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.action == 'opened' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.base.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      url: ${{ steps.release.outputs.url }}

    steps:
      - name: Create release for event
        id: release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const eventName = context.eventName;
            const action = context.payload.action || "";

            let tag;
            let targetCommitish;
            let versionRef;
            let releaseName;
            let body;
            let prerelease = false;

            async function readVersionAtRef(ref) {
              try {
                const response = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: "version.txt",
                  ref
                });

                const content = Buffer.from(response.data.content || "", "base64").toString("utf8").trim();
                if (/^\d+\.\d+\.\d+$/.test(content)) {
                  return content;
                }

                core.warning(`version.txt at ${ref} is invalid ('${content}'). Falling back to 1.0.0.`);
                return "1.0.0";
              } catch (error) {
                core.warning(`Unable to read version.txt at ${ref}. Falling back to 1.0.0.`);
                return "1.0.0";
              }
            }

            function formatReleaseVersion(version) {
              const parts = version.split(".");
              if (parts.length === 3 && parts[2] === "0") {
                return `${parts[0]}.${parts[1]}`;
              }

              return version;
            }

            if (eventName === "pull_request" && action === "opened") {
              const pr = context.payload.pull_request;
              const shortSha = (pr.head.sha || context.sha).slice(0, 7);
              targetCommitish = pr.head.sha || context.sha;
              versionRef = targetCommitish;
              const appVersion = await readVersionAtRef(versionRef);
              const releaseVersion = formatReleaseVersion(appVersion);
              tag = `v${releaseVersion}-preview-pr${pr.number}-${shortSha}`;
              releaseName = `Preview Release ${releaseVersion}: ${pr.title}`;
              body = `**Preview release** of PR #${pr.number}\n\nVersion: ${releaseVersion}\n\n${pr.title}\n\nBuilt artifacts will be attached once the build completes.`;
              prerelease = true;
            } else if (eventName === "pull_request" && action === "closed") {
              const pr = context.payload.pull_request;
              targetCommitish = pr.merge_commit_sha || "main";
              versionRef = pr.merge_commit_sha || context.sha;
              const appVersion = await readVersionAtRef(versionRef);
              const releaseVersion = formatReleaseVersion(appVersion);
              tag = `v${releaseVersion}`;
              releaseName = `Release ${releaseVersion}: ${pr.title}`;
              body = `**Release** of merged PR #${pr.number}\n\nVersion: ${releaseVersion}\n\n${pr.title}\n\nExecutable build artifacts are attached below.`;
            } else {
              const shortSha = (context.sha || "").slice(0, 7);
              targetCommitish = context.sha || "main";
              versionRef = targetCommitish;
              const appVersion = await readVersionAtRef(versionRef);
              const releaseVersion = formatReleaseVersion(appVersion);
              tag = `v${releaseVersion}-build-${shortSha}`;
              releaseName = `Build ${releaseVersion}`;
              body = `**Automated build release** for main branch commit ${shortSha}\n\nVersion: ${releaseVersion}\n\nExecutable build artifacts are attached below.`;
            }

            core.info(`Preparing release with tag ${tag}`);

            let release;
            try {
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: targetCommitish,
                name: releaseName,
                body,
                draft: false,
                prerelease,
                generate_release_notes: true
              });
              release = created.data;
              core.info(`Created release: ${release.html_url}`);
            } catch (error) {
              const message = error.message || "";
              const alreadyExists = error.status === 422 && message.includes("already_exists");

              if (!alreadyExists) {
                throw error;
              }

              core.info(`Release tag ${tag} already exists. Fetching existing release.`);
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              release = existing.data;
            }

            core.setOutput("tag", tag);
            core.setOutput("url", release.html_url);

      - name: Release summary
        run: |
          echo "Release created/available: ${{ steps.release.outputs.url }}"
          echo "Tag: ${{ steps.release.outputs.tag }}"

  build-android-release:
    name: Build Android Release Asset
    runs-on: ubuntu-latest
    needs: [ create-release ]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Android build environment
        uses: ./.github/actions/setup-android-build-env
        with:
          dotnet-version: '10.0.x'
          java-version: '21'

      - name: Build Android APK
        uses: ./.github/actions/build-android-apk
        with:
          configuration: Release

      - name: Upload Android artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-android-apk
          path: AstroTool/bin/Release/net10.0-android/**/publish/*.apk
          if-no-files-found: error

  build-windows-release:
    name: Build Windows Release Asset
    runs-on: ubuntu-latest
    needs: [ create-release ]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: ./.github/actions/setup-dotnet-common
        with:
          dotnet-version: '10.0.x'

      - name: Install Windows MAUI workload
        run: dotnet workload install maui-windows

      - name: Publish Windows (self-contained)
        run: >
          dotnet publish AstroTool/AstroTool.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -r win-x64
          -p:EnableWindowsTargeting=true
          --self-contained true

      - name: Zip Windows publish output
        run: |
          cd AstroTool/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish
          zip -r ../../../../../../astrotool-windows-x64.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-windows-x64
          path: astrotool-windows-x64.zip
          if-no-files-found: error

  publish-release-assets:
    name: Attach Built Assets to Release
    runs-on: ubuntu-latest
    needs: [ create-release, build-android-release, build-windows-release ]
    if: ${{ always() && needs.create-release.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        if: ${{ needs.build-android-release.result == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-android-apk
          path: ./artifacts/android

      - name: Download Windows ZIP
        if: ${{ needs.build-windows-release.result == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-windows-x64
          path: ./artifacts/windows

      - name: Upload release assets
        if: ${{ needs.build-android-release.result == 'success' || needs.build-windows-release.result == 'success' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          fail_on_unmatched_files: false
          files: |
            ./artifacts/android/*.apk
            ./artifacts/windows/*.zip

  # ─────────────────────────────────────────────────────────
  # Bump version after successful merge to main
  # ─────────────────────────────────────────────────────────
  update-version:
    name: Update Version
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.event.head_commit != null &&
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.event.head_commit.message, 'update-version:')
    runs-on: ubuntu-latest
    needs: [ create-release ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET
        uses: ./.github/actions/setup-dotnet-common
        with:
          dotnet-version: '10.0.x'

      - name: Bump minor version
        run: |
          bash scripts/version.sh bump-minor > /tmp/new-version.txt
          NEW_VERSION=$(tail -n 1 /tmp/new-version.txt)
          echo "New version: $NEW_VERSION"

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push version update
        run: |
          NEW_VERSION=$(cat version.txt)
          git add version.txt
          git commit -m "update-version: Bump to $NEW_VERSION" || echo "No changes to commit"
          git push origin main || echo "Failed to push, may already be updated"
        continue-on-error: true