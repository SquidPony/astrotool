name: Auto Release on PR Merge

"on":
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Create release for merged PR
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const mergedAt = new Date(pr.merged_at || Date.now());
            const yyyy = mergedAt.getUTCFullYear();
            const mm = String(mergedAt.getUTCMonth() + 1).padStart(2, "0");
            const dd = String(mergedAt.getUTCDate()).padStart(2, "0");
            const shortSha = (pr.merge_commit_sha || context.sha).slice(0, 7);
            const tag = `v${yyyy}.${mm}.${dd}-pr${pr.number}-${shortSha}`;

            core.info(`Preparing release for PR #${pr.number} with tag ${tag}`);

            let release;
            try {
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: pr.merge_commit_sha || "main",
                name: `Release ${tag}`,
                body: `Automated release for merged PR #${pr.number}: ${pr.title}`,
                draft: false,
                prerelease: false,
                generate_release_notes: true
              });
              release = created.data;
              core.info(`Created release: ${release.html_url}`);
            } catch (error) {
              const message = error.message || "";
              const alreadyExists = error.status === 422 && message.includes("already_exists");

              if (!alreadyExists) {
                throw error;
              }

              core.info(`Release tag ${tag} already exists. Fetching existing release.`);
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              release = existing.data;
            }

            core.setOutput("tag", tag);
            core.setOutput("url", release.html_url);

      - name: Release summary
        run: |
          echo "Release created/available: ${{ steps.release.outputs.url }}"
          echo "Tag: ${{ steps.release.outputs.tag }}"
