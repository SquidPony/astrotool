name: Auto Release on PR and Main Events

on:
  pull_request:
    branches: [ main ]
    types: [ opened, closed ]
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

jobs:
  create-release:
    name: Create GitHub Release
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action == 'opened') ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Create release for event
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const action = context.payload.action || "";

            const now = new Date();
            const yyyy = now.getUTCFullYear();
            const mm = String(now.getUTCMonth() + 1).padStart(2, "0");
            const dd = String(now.getUTCDate()).padStart(2, "0");

            let tag;
            let targetCommitish;
            let releaseName;
            let body;
            let prerelease = false;

            if (eventName === "pull_request" && action === "opened") {
              const pr = context.payload.pull_request;
              const shortSha = (pr.head.sha || context.sha).slice(0, 7);
              tag = `v${yyyy}.${mm}.${dd}-pr${pr.number}-${shortSha}`;
              targetCommitish = pr.head.sha || context.sha;
              releaseName = `PR Preview ${tag}`;
              body = `Automated preview release for PR #${pr.number}: ${pr.title}`;
              prerelease = true;
            } else if (eventName === "pull_request" && action === "closed") {
              const pr = context.payload.pull_request;
              const shortSha = (pr.merge_commit_sha || context.sha).slice(0, 7);
              tag = `v${yyyy}.${mm}.${dd}-merge-pr${pr.number}-${shortSha}`;
              targetCommitish = pr.merge_commit_sha || "main";
              releaseName = `Merged PR Release ${tag}`;
              body = `Automated release for merged PR #${pr.number}: ${pr.title}`;
            } else {
              const shortSha = (context.sha || "").slice(0, 7);
              tag = `v${yyyy}.${mm}.${dd}-main-${shortSha}`;
              targetCommitish = context.sha || "main";
              releaseName = `Main Push Release ${tag}`;
              body = `Automated release for push to main at ${context.sha}`;
            }

            core.info(`Preparing release with tag ${tag}`);

            let release;
            try {
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: targetCommitish,
                name: releaseName,
                body,
                draft: false,
                prerelease,
                generate_release_notes: true
              });
              release = created.data;
              core.info(`Created release: ${release.html_url}`);
            } catch (error) {
              const message = error.message || "";
              const alreadyExists = error.status === 422 && message.includes("already_exists");

              if (!alreadyExists) {
                throw error;
              }

              core.info(`Release tag ${tag} already exists. Fetching existing release.`);
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              release = existing.data;
            }

            core.setOutput("tag", tag);
            core.setOutput("url", release.html_url);

      - name: Release summary
        run: |
          echo "Release created/available: ${{ steps.release.outputs.url }}"
          echo "Tag: ${{ steps.release.outputs.tag }}"