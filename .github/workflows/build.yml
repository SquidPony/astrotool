name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created, published ]

jobs:
  # ─────────────────────────────────────────────────────────
  # Unit Tests (AstroTool.Core)
  # ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore AstroTool.Core.Tests/AstroTool.Core.Tests.csproj

      - name: Run tests
        run: >
          dotnet test AstroTool.Core.Tests/AstroTool.Core.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Publish test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx

  # ─────────────────────────────────────────────────────────
  # Android APK (ubuntu cross-compile)
  # ─────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Install Android workload
        run: dotnet workload install maui-android

      - name: Build Android APK
        run: >
          dotnet publish AstroTool/AstroTool.csproj
          -f net10.0-android
          -c Release
          -p:EnableAndroidTarget=true
          -p:AndroidKeyStore=false

      - name: Upload Android artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-apk
          path: AstroTool/bin/Release/net10.0-android/publish/*.apk
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # Windows self-contained EXE (cross-compiled from Linux)
  # ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Install Windows MAUI workload
        run: dotnet workload install maui-windows

      - name: Publish Windows (self-contained)
        run: >
          dotnet publish AstroTool/AstroTool.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -r win-x64
          -p:EnableWindowsTargeting=true
          --self-contained true

      - name: Zip Windows publish output
        run: |
          cd AstroTool/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish
          zip -r ../../../../../../astrotool-windows-x64.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-x64
          path: astrotool-windows-x64.zip
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # iOS simulator app (macOS only)
  # ─────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.203'

      - name: Install iOS workload
        run: dotnet workload install maui-ios

      - name: Build iOS (simulator)
        run: >
          dotnet build AstroTool/AstroTool.csproj
          -f net10.0-ios
          -c Debug
          -p:EnableAppleTargets=false
          -p:EnableIosTarget=true
          -p:MtouchLink=SdkOnly
          -p:RuntimeIdentifier=iossimulator-arm64
          -p:CodesignKey=""
          -p:CodesignProvision=""

      - name: Upload iOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-simulator-app
          path: AstroTool/bin/Debug/net10.0-ios/iossimulator-arm64/**/*.app
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # macCatalyst app (macOS only)
  # ─────────────────────────────────────────────────────────
  build-maccatalyst:
    name: Build macCatalyst
    runs-on: macos-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.203'

      - name: Install macCatalyst workload
        run: dotnet workload install maui-maccatalyst

      - name: Build macCatalyst
        run: >
          dotnet build AstroTool/AstroTool.csproj
          -f net10.0-maccatalyst
          -c Debug
          -p:RuntimeIdentifier=maccatalyst-arm64
          -p:MtouchLink=SdkOnly
          -p:EnableCodeSigning=false
          -p:CodesignKey=""
          -p:CodesignProvision=""

      - name: Upload macCatalyst artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: maccatalyst-app
          path: AstroTool/bin/Debug/net10.0-maccatalyst/**/*.app
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # Attach artifacts to GitHub Release
  # ─────────────────────────────────────────────────────────
  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.release.draft == false && github.event.release.prerelease == false && github.event.release.target_commitish == 'main'
    needs: [ build-android, build-windows, build-ios, build-maccatalyst ]
    concurrency:
      group: publish-release-${{ github.event.release.tag_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: android-apk
          path: ./artifacts/android

      - name: Download Windows ZIP
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: windows-x64
          path: ./artifacts/windows

      - name: Download iOS app
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ios-simulator-app
          path: ./artifacts/ios

      - name: Download macCatalyst app
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: maccatalyst-app
          path: ./artifacts/maccatalyst

      - name: Zip iOS artifact
        run: |
          cd ./artifacts/ios
          zip -r ../astrotool-ios-simulator.zip .

      - name: Zip macCatalyst artifact
        run: |
          cd ./artifacts/maccatalyst
          zip -r ../astrotool-maccatalyst.zip .

      - name: Upload release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: |
            ./artifacts/android/*.apk
            ./artifacts/windows/*.zip
            ./artifacts/astrotool-ios-simulator.zip
            ./artifacts/astrotool-maccatalyst.zip
