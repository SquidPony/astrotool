name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created, published ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_XMLDOC_MODE: skip

jobs:
  # ─────────────────────────────────────────────────────────
  # Unit Tests (AstroTool.Core)
  # ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: ./.github/actions/setup-dotnet-common
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore AstroTool.Core.Tests/AstroTool.Core.Tests.csproj

      - name: Run tests
        run: >
          dotnet test AstroTool.Core.Tests/AstroTool.Core.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Publish test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx

  # ─────────────────────────────────────────────────────────
  # Android APK (ubuntu cross-compile)
  # ─────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Android build environment
        uses: ./.github/actions/setup-android-build-env
        with:
          dotnet-version: '10.0.x'
          java-version: '21'

      - name: Build Android APK
        uses: ./.github/actions/build-android-apk
        with:
          configuration: Release

      - name: Upload Android artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-apk
          path: AstroTool/bin/Release/net10.0-android/**/publish/*.apk
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # Windows self-contained EXE (cross-compiled from Linux)
  # ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET
        uses: ./.github/actions/setup-dotnet-common
        with:
          dotnet-version: '10.0.x'

      - name: Install Windows MAUI workload
        run: dotnet workload install maui-windows

      - name: Publish Windows (self-contained)
        run: >
          dotnet publish AstroTool/AstroTool.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -r win-x64
          -p:EnableWindowsTargeting=true
          --self-contained true

      - name: Reorganize Windows artifact layout
        run: |
          publish_dir="AstroTool/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish"
          exe_path="$publish_dir/AstroTool.exe"
          if [ ! -f "$exe_path" ]; then
            exe_path="$(find "$publish_dir" -maxdepth 1 -type f -name '*.exe' | head -n 1)"
          fi
          if [ -z "$exe_path" ]; then
            echo "No executable found in $publish_dir" >&2
            exit 1
          fi

          exe_name="$(basename "$exe_path")"
          mkdir -p "$publish_dir/deps"
          find "$publish_dir" -mindepth 1 -maxdepth 1 \
            ! -name "$exe_name" \
            ! -name deps \
            -exec mv {} "$publish_dir/deps/" \;

      - name: Zip Windows publish output
        run: |
          cd AstroTool/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish
          zip -r ../../../../../../astrotool-windows-x64.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-x64
          path: astrotool-windows-x64.zip
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # Attach artifacts to GitHub Release
  # ─────────────────────────────────────────────────────────
  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'release' && github.event.release.draft == false }}
    needs: [ build-android, build-windows ]
    concurrency:
      group: publish-release-${{ github.event.release.tag_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        if: ${{ needs.build-android.result == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: android-apk
          path: ./artifacts/android

      - name: Download Windows ZIP
        if: ${{ needs.build-windows.result == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: windows-x64
          path: ./artifacts/windows

      - name: Upload release assets
        if: ${{ needs.build-android.result == 'success' || needs.build-windows.result == 'success' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          fail_on_unmatched_files: false
          files: |
            ./artifacts/android/*.apk
            ./artifacts/windows/*.zip

