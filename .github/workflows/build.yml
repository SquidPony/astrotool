name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  # ─────────────────────────────────────────────────────────
  # Unit Tests (AstroTool.Core)
  # ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore AstroTool.Core.Tests/AstroTool.Core.Tests.csproj

      - name: Run tests
        run: >
          dotnet test AstroTool.Core.Tests/AstroTool.Core.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx

  # ─────────────────────────────────────────────────────────
  # Android APK (ubuntu cross-compile)
  # ─────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Android workload
        run: dotnet workload install maui-android

      - name: Build Android APK
        run: >
          dotnet publish AstroTool/AstroTool.csproj
          -f net10.0-android
          -c Release
          -p:TargetFrameworks=net10.0-android
          -p:AndroidKeyStore=false

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: AstroTool/bin/Release/net10.0-android/publish/*.apk
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # Windows self-contained EXE (cross-compiled from Linux)
  # ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Windows MAUI workload
        run: dotnet workload install maui-windows

      - name: Publish Windows (self-contained)
        run: >
          dotnet publish AstroTool/AstroTool.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -r win-x64
          -p:TargetFrameworks=net10.0-windows10.0.19041.0
          -p:EnableWindowsTargeting=true
          --self-contained true

      - name: Zip Windows publish output
        run: |
          cd AstroTool/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish
          zip -r ../../../../../../astrotool-windows-x64.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: astrotool-windows-x64.zip
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # iOS simulator app (macOS only)
  # ─────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install iOS workload
        run: dotnet workload install maui-ios

      - name: Build iOS (simulator)
        run: >
          dotnet build AstroTool/AstroTool.csproj
          -f net10.0-ios
          -c Release
          -p:TargetFrameworks=net10.0-ios
          -p:EnableIosTarget=true
          -p:RuntimeIdentifier=iossimulator-arm64
          -p:CodesignKey=""
          -p:CodesignProvision=""

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: AstroTool/bin/Release/net10.0-ios/iossimulator-arm64/**/*.app
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # macCatalyst app (macOS only)
  # ─────────────────────────────────────────────────────────
  build-maccatalyst:
    name: Build macCatalyst
    runs-on: macos-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install macCatalyst workload
        run: dotnet workload install maui-maccatalyst

      - name: Build macCatalyst
        run: >
          dotnet build AstroTool/AstroTool.csproj
          -f net10.0-maccatalyst
          -c Release
          -p:TargetFrameworks=net10.0-maccatalyst
          -p:RuntimeIdentifier=maccatalyst-arm64
          -p:EnableCodeSigning=false
          -p:CodesignKey=""
          -p:CodesignProvision=""

      - name: Upload macCatalyst artifact
        uses: actions/upload-artifact@v4
        with:
          name: maccatalyst-app
          path: AstroTool/bin/Release/net10.0-maccatalyst/**/*.app
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # Attach artifacts to GitHub Release
  # ─────────────────────────────────────────────────────────
  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [ build-android, build-windows, build-ios, build-maccatalyst ]
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts/android

      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: ./artifacts/windows

      - name: Download iOS app
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator-app
          path: ./artifacts/ios

      - name: Download macCatalyst app
        uses: actions/download-artifact@v4
        with:
          name: maccatalyst-app
          path: ./artifacts/maccatalyst

      - name: Zip iOS artifact
        run: |
          cd ./artifacts/ios
          zip -r ../astrotool-ios-simulator.zip .

      - name: Zip macCatalyst artifact
        run: |
          cd ./artifacts/maccatalyst
          zip -r ../astrotool-maccatalyst.zip .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/android/*.apk
            ./artifacts/windows/*.zip
            ./artifacts/astrotool-ios-simulator.zip
            ./artifacts/astrotool-maccatalyst.zip
